<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Time Table</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>TIME TABLE</h1>

    <div class="status-dashboard">
        <div class="status-top-row">
            <div class="live-badge">
                <div class="red-dot"></div> LIVE
            </div>
            <div id="digitalClock" class="digital-clock">00:00:00</div>
        </div>
        
        <h2 id="currentStatus" class="main-status-text">Loading...</h2>
        <p id="currentDayText" style="color: #aaa; margin: 0; font-size: 0.9rem;">Checking Schedule...</p>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Day</th>
                    <th>1<br><span class="time-small">9:30-10:30</span></th>
                    <th>2<br><span class="time-small">10:30-11:25</span></th>
                    <th>3<br><span class="time-small">11:35-12:30</span></th>
                    <th>4<br><span class="time-small">After Lunch</span></th>
                    <th>5<br><span class="time-small">Last Hour</span></th>
                </tr>
            </thead>
            <tbody>
                <tr id="row-1">
                    <td class="day-col">MON</td>
                    <td id="d1-h1">JAVA</td>
                    <td id="d1-h2">PHP</td>
                    <td id="d1-h3">PHP</td>
                    <td id="d1-h4">DV</td>
                    <td id="d1-h5">DE</td>
                </tr>
                <tr id="row-2">
                    <td class="day-col">TUE</td>
                    <td id="d2-h1">KE</td>
                    <td id="d2-h2">DE</td>
                    <td id="d2-h3">JAVA</td>
                    <td id="d2-h4">PHP</td>
                    <td id="d2-h5">DV</td>
                </tr>
                <tr id="row-3">
                    <td class="day-col">WED</td>
                    <td id="d3-h1">DV</td>
                    <td id="d3-h2">IT</td>
                    <td id="d3-h3">DE</td>
                    <td id="d3-h4">PHP</td>
                    <td id="d3-h5">KE</td>
                </tr>
                <tr id="row-4">
                    <td class="day-col">THU</td>
                    <td id="d4-h1">KE</td>
                    <td id="d4-h2">JAVA</td>
                    <td id="d4-h3">IT</td>
                    <td id="d4-h4">JAVA</td>
                    <td id="d4-h5">DE</td>
                </tr>
                <tr id="row-5">
                    <td class="day-col">FRI</td>
                    <td id="d5-h1">KE</td>
                    <td id="d5-h2">DV</td>
                    <td id="d5-h3">PHP</td>
                    <td id="d5-h4">JAVA</td>
                    <td id="d5-h5">IT</td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="button-container" style="margin-top: 20px;">
        <button onclick="goHome()">BACK TO HOME</button>
    </div>

    <script src="script.js"></script>
    <script>
        checkTimeTable();
        setInterval(checkTimeTable, 1000); 
    </script>
</body>
</html>
